# SPI + I2C buses
CONFIG_SPI=y
CONFIG_I2C=y

# Sensors
CONFIG_SENSOR=y
CONFIG_MPU6050=y
CONFIG_MPU6050_TRIGGER_GLOBAL_THREAD=y
# The MPU6050 driver uses CONFIG_SENSOR_LOG_LEVEL.
# Setting to OFF silences transient I2C fetch errors during vigorous shaking.
CONFIG_SENSOR_LOG_LEVEL_OFF=y

# Floating point — needed for shock magnitude calculation (sqrt)
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# Flash
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_JESD216_API=y
CONFIG_SPI_NOR_SFDP_MINIMAL=y
# CONFIG_SPI_NOR_SFDP_RUNTIME=y

# Logging — RTT only, application level only
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=2
CONFIG_LOG_MAX_LEVEL=3
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_UART_CONSOLE=n
CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=500

# Increase RTT buffer so nothing gets dropped
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096

# ── Stack sizes ───────────────────────────────────────────────────────
# LittleFS mount/format requires significant stack depth (~3KB minimum).
# Main thread calls shock_log_init() → fs_mount() → LittleFS format.
CONFIG_MAIN_STACK_SIZE=4096
# System workqueue runs MPU-6050 trigger callbacks
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="AssetTracker"
CONFIG_BT_DEVICE_APPEARANCE=0
CONFIG_BT_MAX_CONN=1
CONFIG_BT_GATT_DYNAMIC_DB=n

# ATT / GATT tuning
CONFIG_BT_ATT_PREPARE_COUNT=0
CONFIG_BT_L2CAP_TX_BUF_COUNT=6

# BT logging — silent in production
CONFIG_BT_LOG_LEVEL_OFF=y

# ── Filesystem (LittleFS on external flash) ───────────────────────────
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FS_LOG_LEVEL_ERR=y